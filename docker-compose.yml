# ─────────────────────────────────────────────────────────────
# Docker Compose — 美食食谱网站（开发 & 生产通用）
#
# 用法:
#   开发:  docker-compose up          （文件变更自动重载）
#   生产:  docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#   测试:  docker-compose run backend npm test
#   清理:  docker-compose down -v
# ─────────────────────────────────────────────────────────────

services:

  # ───────────────────────────────────────────────────────────
  # 前端 — Nginx 托管 Vue SPA，代理 /api 到后端
  # ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ./Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-/api}
    container_name: food-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - food-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ───────────────────────────────────────────────────────────
  # 后端 — Node.js + Express API 服务
  # ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ./Dockerfile
    container_name: food-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3001}:${PORT:-3001}"
    environment:
      # 通用配置（见 .env.example）
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3001}

      # 数据库
      DB_DIALECT: ${DB_DIALECT:-mysql}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-food_website}
      DB_USER: ${DB_USER:-${MYSQL_USER:-food_user}}
      DB_PASS: ${DB_PASS:-${MYSQL_PASSWORD}}
      DB_POOL_MAX: ${DB_POOL_MAX:-10}
      DB_POOL_MIN: ${DB_POOL_MIN:-2}
      DB_POOL_ACQUIRE: ${DB_POOL_ACQUIRE:-30000}
      DB_POOL_IDLE: ${DB_POOL_IDLE:-10000}

      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}

      # 限流
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}

      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - food-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-3001}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ───────────────────────────────────────────────────────────
  # MySQL 数据库（生产建议使用云数据库，此处仅本地开发使用）
  # ───────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: food-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
      MYSQL_DATABASE: ${DB_NAME:-food_website}
      MYSQL_USER: ${MYSQL_USER:-food_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-food_password}
    volumes:
      # 持久化数据
      - mysql_data:/var/lib/mysql
      # 初始化 SQL 脚本（首次启动自动执行）
      - ./backend/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --skip-log-bin
    networks:
      - food-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_secret}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ───────────────────────────────────────────────────────────
  # Redis（可选，收藏计数缓存 / Session 存储）
  # ───────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: food-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - food-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

# ─────────────────────────────────────────────────────────────
# 网络
# ─────────────────────────────────────────────────────────────
networks:
  food-network:
    driver: bridge

# ─────────────────────────────────────────────────────────────
# 持久化卷
# ─────────────────────────────────────────────────────────────
volumes:
  mysql_data:
  redis_data:
