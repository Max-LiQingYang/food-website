# ─────────────────────────────────────────────────────────────
# Docker Compose — 美食食谱网站（生产部署）
#
# 镜像由 CI/CD 构建并推送至 ghcr.io，服务器直接拉取运行
# 数据库使用宿主机 MariaDB（172.17.0.1），Redis 未使用
# ─────────────────────────────────────────────────────────────

services:

  # ───────────────────────────────────────────────────────────
  # 前端 — Nginx 托管 Vue SPA，代理 /api 到后端
  # ───────────────────────────────────────────────────────────
  frontend:
    image: ghcr.io/max-liqingyang/food-website-frontend:latest
    container_name: food-frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
    depends_on:
      - backend
    networks:
      - food-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ───────────────────────────────────────────────────────────
  # 后端 — Node.js + Express API 服务
  # ───────────────────────────────────────────────────────────
  backend:
    image: ghcr.io/max-liqingyang/food-website-backend:latest
    container_name: food-backend
    restart: unless-stopped
    ports:
      - "3000:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3001}

      # 数据库（连接宿主机 MariaDB）
      DB_DIALECT: ${DB_DIALECT:-mysql}
      DB_HOST: ${DB_HOST:-172.17.0.1}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-food_website}
      DB_USER: ${DB_USER:-food_user}
      DB_PASS: ${DB_PASS:-food_password}
      DB_POOL_MAX: ${DB_POOL_MAX:-10}
      DB_POOL_MIN: ${DB_POOL_MIN:-2}
      DB_POOL_ACQUIRE: ${DB_POOL_ACQUIRE:-30000}
      DB_POOL_IDLE: ${DB_POOL_IDLE:-10000}

      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}

      # 限流
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}

      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}

      # AI 模型（火山引擎 DeepSeek V3.2）
      AI_API_BASE_URL: ${AI_API_BASE_URL:-https://ark.cn-beijing.volces.com/api/coding/v3}
      AI_API_KEY: ${AI_API_KEY:-c5163514-30fb-45b5-8fff-0bf0e76e11c4}
      AI_MODEL: ${AI_MODEL:-deepseek-v3.2}
    networks:
      - food-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-3001}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

# ─────────────────────────────────────────────────────────────
# 网络
# ─────────────────────────────────────────────────────────────
networks:
  food-network:
    driver: bridge
